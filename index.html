<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Graus de Network</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1e2522;
        color: #f0f5f1;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1 {
        color: #4ade80;
        margin-bottom: 30px;
    }
    .container {
        background-color: #2a342e;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 600px;
    }
    .input-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        position: relative;
    }
    label {
        margin-bottom: 8px;
        font-weight: bold;
    }
    input {
        padding: 12px;
        border: 1px solid #4a5c52;
        border-radius: 5px;
        background-color: #1e2522;
        color: #fff;
        font-size: 16px;
    }
    input:focus {
        outline: none;
        border-color: #4ade80;
    }
    .autocomplete-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background-color: #1e2522;
        border: 1px solid #4ade80;
        border-top: none;
        border-radius: 0 0 5px 5px;
        max-height: 250px;
        overflow-y: auto;
        z-index: 1000;
        list-style: none;
        padding: 0;
        margin: 0;
        display: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .autocomplete-list.show {
        display: block;
    }
    .autocomplete-item {
        padding: 12px;
        cursor: pointer;
        border-bottom: 1px solid #2a342e;
    }
    .autocomplete-item:last-child {
        border-bottom: none;
    }
    .autocomplete-item:hover {
        background-color: #4ade80;
        color: #1e2522;
        font-weight: bold;
    }
    .buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
    }
    button {
        flex: 1;
        padding: 12px;
        background-color: #4ade80;
        color: #1e2522;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    button:hover {
        background-color: #22c55e;
    }
    button.secondary {
        background-color: #4a5c52;
        color: #fff;
    }
    button.secondary:hover {
        background-color: #5c7265;
    }
    button:disabled {
        background-color: #36423a;
        color: #7a8c82;
        cursor: not-allowed;
    }
    #results {
        margin-top: 30px;
        padding: 20px;
        background-color: #1e2522;
        border-radius: 5px;
        min-height: 100px;
    }
    .path-item {
        background-color: #2a342e;
        padding: 15px;
        margin-bottom: 10px;
        border-left: 4px solid #4ade80;
        border-radius: 4px;
    }
    .path-length {
        font-weight: bold;
        color: #4ade80;
        margin-bottom: 10px;
        display: block;
    }
    .error {
        color: #ef4444;
        font-weight: bold;
    }
    .loading {
        color: #60a5fa;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
</style>
</head>
<body>
<script src="bfs.js"></script>

<h1>8 Graus de Network</h1>

<div class="container">
    <div id="statusMessage" class="loading">Carregando dados do servidor...</div>

    <div class="input-group">
        <label for="actorOrigin">Ator de Origem</label>
        <input type="text" id="actorOrigin" placeholder="Digite ou selecione o ator de origem..." autocomplete="off" disabled>
        <ul id="listOrigin" class="autocomplete-list"></ul>
    </div>

    <div class="input-group">
        <label for="actorDest">Ator de Destino</label>
        <input type="text" id="actorDest" placeholder="Digite ou selecione o ator de destino..." autocomplete="off" disabled>
        <ul id="listDest" class="autocomplete-list"></ul>
    </div>

    <div class="buttons">
        <button id="btnBfs" onclick="executeBFS()" disabled>BFS (Caminho Mínimo)</button>
        <button class="secondary" id="btnBfs8" onclick="executeBFS8()" disabled>BFS (Até 8 Graus)</button>
    </div>

    <div id="results">
        Aguardando carregamento dos dados...
    </div>
</div>

<script>
const graph = new Map();
const actorsSet = new Set();
let sortedActorsList = [];

// Web Worker handles all BFS computation to keep the UI thread free.
const worker = new Worker('./bfs.worker.js');

worker.onmessage = function (e) {
    const msg = e.data;

    if (msg.type === 'ready') {
        document.getElementById('statusMessage').style.display = 'none';
        document.getElementById('actorOrigin').disabled = false;
        document.getElementById('actorDest').disabled = false;
        document.getElementById('btnBfs').disabled = false;
        document.getElementById('btnBfs8').disabled = false;
        renderResults('Dados carregados com sucesso. Selecione os atores e execute a busca.');
        return;
    }

    if (msg.type === 'bfs_shortest_result') {
        setButtonsEnabled(true);
        if (msg.path) {
            renderResults(formatPathHTML(msg.path));
        } else {
            renderResults('<span class="error">Relacionamento inexistente entre os atores selecionados.</span>');
        }
        return;
    }

    if (msg.type === 'bfs_all8_result') {
        setButtonsEnabled(true);
        if (msg.paths.length > 0) {
            let html = `<h3>Caminhos encontrados (Máx ${BFS.MAX_DEGREES} Graus): ${msg.paths.length}</h3>`;
            const fragment = document.createDocumentFragment();
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html;
            msg.paths.forEach(p => {
                wrapper.innerHTML += formatPathHTML(p);
            });
            renderResults(wrapper.innerHTML);
        } else {
            renderResults('<span class="error">Relacionamento inexistente ou excede o limite de 8 arestas.</span>');
        }
        return;
    }
};

worker.onerror = function (e) {
    setButtonsEnabled(true);
    renderResults('<span class="error">Erro no processador de busca: ' + e.message + '</span>');
};

function setButtonsEnabled(enabled) {
    document.getElementById('btnBfs').disabled = !enabled;
    document.getElementById('btnBfs8').disabled = !enabled;
}

function seedGraph(data) {
    data.forEach(movie => {
        const movieTitle = movie.title;
        if (movie.cast && Array.isArray(movie.cast)) {
            movie.cast.forEach(actor => {
                BFS.addEdge(graph, movieTitle, actor);
                actorsSet.add(actor);
            });
        }
    });
    sortedActorsList = Array.from(actorsSet).sort();
}

async function loadData() {
    try {
        const response = await fetch('./latest_movies.json');
        if (!response.ok) throw new Error('Falha na rede ao tentar carregar o arquivo.');
        
        const data = await response.json();
        seedGraph(data);
        
        setupAutocomplete('actorOrigin', 'listOrigin');
        setupAutocomplete('actorDest', 'listDest');

        // Send the graph to the worker once. The worker signals 'ready' when set up,
        // at which point the search buttons are enabled.
        document.getElementById('statusMessage').textContent = 'Configurando buscador...';
        worker.postMessage({ type: 'init', graphEntries: [...graph.entries()] });
        
    } catch (error) {
        document.getElementById('statusMessage').style.display = 'none';
        renderResults(`<span class="error">Erro ao carregar latest_movies.json: ${error.message}. Você está rodando a aplicação em um servidor local?</span>`);
    }
}

function setupAutocomplete(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);

    function renderList() {
        const val = input.value.trim().toLowerCase();
        list.innerHTML = '';
        
        const matches = val ? sortedActorsList.filter(actor => actor.toLowerCase().includes(val)) : sortedActorsList;
        
        if (matches.length > 0) {
            const fragment = document.createDocumentFragment();
            matches.forEach(match => {
                const li = document.createElement('li');
                li.className = 'autocomplete-item';
                li.textContent = match;
                li.addEventListener('click', function(e) {
                    e.stopPropagation();
                    input.value = match;
                    list.innerHTML = '';
                    list.classList.remove('show');
                });
                fragment.appendChild(li);
            });
            list.appendChild(fragment);
            list.classList.add('show');
        } else {
            list.classList.remove('show');
        }
    }

    input.addEventListener('input', renderList);
    input.addEventListener('focus', renderList);
}

document.addEventListener('click', function(e) {
    const lists = document.querySelectorAll('.autocomplete-list');
    lists.forEach(list => {
        const inputId = list.id === 'listOrigin' ? 'actorOrigin' : 'actorDest';
        const input = document.getElementById(inputId);
        if (e.target !== input && e.target !== list) {
            list.classList.remove('show');
        }
    });
});

function formatPathHTML(path) {
    const lengthEdges = path.length - 1;
    const degrees = lengthEdges / 2;
    const pathString = path.join(' ➔ ');
    
    return `
        <div class="path-item">
            <span class="path-length">Comprimento: ${lengthEdges} arestas (${degrees} graus de separação)</span>
            <div>${pathString}</div>
        </div>
    `;
}

function renderResults(htmlContent) {
    document.getElementById('results').innerHTML = htmlContent;
}

function executeBFS() {
    const origin = document.getElementById('actorOrigin').value.trim();
    const dest = document.getElementById('actorDest').value.trim();

    if (!origin || !dest) {
        renderResults('<span class="error">Por favor, selecione dois atores válidos.</span>');
        return;
    }

    setButtonsEnabled(false);
    renderResults('<p class="loading">Processando busca...</p>');
    worker.postMessage({ type: 'bfs_shortest', start: origin, end: dest });
}

function executeBFS8() {
    const origin = document.getElementById('actorOrigin').value.trim();
    const dest = document.getElementById('actorDest').value.trim();

    if (!origin || !dest) {
        renderResults('<span class="error">Por favor, selecione dois atores válidos.</span>');
        return;
    }

    setButtonsEnabled(false);
    renderResults('<p class="loading">Processando busca...</p>');
    worker.postMessage({ type: 'bfs_all8', start: origin, end: dest });
}

window.onload = loadData;
</script>

</body>
</html>
