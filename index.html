<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8 Graus de Network</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1e2522;
        color: #f0f5f1;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        color: #4ade80;
        margin-bottom: 30px;
      }
      .project-info {
        width: 100%;
        max-width: 600px;
        margin: 0 0 18px;
        padding: 14px 18px;
        border: 1px solid #4a5c52;
        border-radius: 10px;
        background: rgba(30, 37, 34, 0.72);
        color: #d7e2dc;
        line-height: 1.5;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.18);
      }
      .project-info strong {
        color: #4ade80;
      }
      .container {
        background-color: #2a342e;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 600px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        position: relative;
      }
      label {
        margin-bottom: 8px;
        font-weight: bold;
      }
      input {
        padding: 12px;
        border: 1px solid #4a5c52;
        border-radius: 5px;
        background-color: #1e2522;
        color: #fff;
        font-size: 16px;
      }
      input:focus {
        outline: none;
        border-color: #4ade80;
      }
      .autocomplete-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background-color: #1e2522;
        border: 1px solid #4ade80;
        border-top: none;
        border-radius: 0 0 5px 5px;
        max-height: 250px;
        overflow-y: auto;
        z-index: 1000;
        list-style: none;
        padding: 0;
        margin: 0;
        display: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      }
      .autocomplete-list.show {
        display: block;
      }
      .autocomplete-item {
        padding: 12px;
        cursor: pointer;
        border-bottom: 1px solid #2a342e;
      }
      .autocomplete-item:last-child {
        border-bottom: none;
      }
      .autocomplete-item:hover {
        background-color: #4ade80;
        color: #1e2522;
        font-weight: bold;
      }
      .autocomplete-item.active {
        background-color: #4ade80;
        color: #1e2522;
        font-weight: bold;
      }
      .buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }
      button {
        flex: 1;
        padding: 12px;
        background-color: #4ade80;
        color: #1e2522;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #22c55e;
      }
      button.secondary {
        background-color: #4a5c52;
        color: #fff;
      }
      button.secondary:hover {
        background-color: #5c7265;
      }
      button:disabled {
        background-color: #36423a;
        color: #7a8c82;
        cursor: not-allowed;
      }
      #results {
        margin-top: 30px;
        padding: 20px;
        background-color: #1e2522;
        border-radius: 5px;
        min-height: 100px;
      }
      .path-item {
        background-color: #2a342e;
        padding: 15px;
        margin-bottom: 10px;
        border-left: 4px solid #4ade80;
        border-radius: 4px;
      }
      .path-length {
        font-weight: bold;
        color: #4ade80;
        margin-bottom: 10px;
        display: block;
      }
      .error {
        color: #ef4444;
        font-weight: bold;
      }
      .loading {
        color: #60a5fa;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <h1>8 Graus de Network</h1>

    <div class="project-info" aria-label="Informações do projeto">
      <div><strong>UNESC</strong></div>
      <div>Curso: Ciência da Computação</div>
      <div>Fase: 5ª</div>
      <div>Disciplina: Teoria de Grafos</div>
      <div>Aluno: Emanuel Cardoso Tavecia</div>
    </div>

    <div class="container">
      <div id="statusMessage" class="loading">
        Carregando dados do servidor...
      </div>

      <div class="input-group">
        <label for="actorOrigin">Ator de Origem</label>
        <input
          type="text"
          id="actorOrigin"
          placeholder="Digite ou selecione o ator de origem..."
          autocomplete="off"
          disabled
        />
        <ul id="listOrigin" class="autocomplete-list"></ul>
      </div>

      <div class="input-group">
        <label for="actorDest">Ator de Destino</label>
        <input
          type="text"
          id="actorDest"
          placeholder="Digite ou selecione o ator de destino..."
          autocomplete="off"
          disabled
        />
        <ul id="listDest" class="autocomplete-list"></ul>
      </div>

      <div class="buttons">
        <button id="btnBfs" disabled>BFS (Caminho Mínimo)</button>
        <button class="secondary" id="btnBfs8" disabled>
          BFS (Comprimento 8)
        </button>
      </div>

      <div id="results">Aguardando carregamento dos dados...</div>
    </div>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
